name: CD — Staging (Fully Automated)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: current sha)"
        required: false

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: cicd-python-ecs-staging-eks
  TERRAFORM_VERSION: "1.6.0"
  ENVIRONMENT: staging

jobs:
  pre-flight:
    name: Security Gate (tfsec + checkov + Trivy)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build image for scan
        run: docker build -t app:${{ steps.tag.outputs.tag }} src/

      - name: Trivy gate (CRITICAL only — blocks deploy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ steps.tag.outputs.tag }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: tfsec (HIGH severity gate)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          minimum_severity: HIGH

      - name: Checkov (>= 95% compliance)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          framework: terraform
          check: CKV_AWS_*
          soft_fail: false

  deploy-staging:
    name: Build → Push → Terraform (EKS) → Validate
    runs-on: ubuntu-latest
    needs: pre-flight
    permissions:
      id-token: write   # OIDC for AWS auth
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ needs.pre-flight.outputs.image_tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/cicd-python-ecs:$IMAGE_TAG src/
          docker push $ECR_REGISTRY/cicd-python-ecs:$IMAGE_TAG
          docker tag $ECR_REGISTRY/cicd-python-ecs:$IMAGE_TAG \
                     $ECR_REGISTRY/cicd-python-ecs:latest-staging
          docker push $ECR_REGISTRY/cicd-python-ecs:latest-staging

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init

      - name: Terraform Apply (staging)
        run: |
          cd infrastructure/terraform
          terraform workspace select ${{ env.ENVIRONMENT }} || \
            terraform workspace new ${{ env.ENVIRONMENT }}
          terraform apply \
            -var-file=environments/${{ env.ENVIRONMENT }}.tfvars \
            -var="image_tag=${{ steps.tag.outputs.tag }}" \
            -var="enable_eks=true" \
            -var="enable_ecs=false" \
            -var="enable_bedrock_irsa=true" \
            -auto-approve

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy workload to EKS
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          BEDROCK_ROLE_ARN=$(cd infrastructure/terraform && terraform output -raw bedrock_irsa_role_arn)
          IMAGE_URI="$ECR_REGISTRY/cicd-python-ecs:$IMAGE_TAG"
          CANARY_REPLICAS=1
          FULL_REPLICAS=2

          kubectl apply -f k8s/base/namespace.yaml
          sed "s|BEDROCK_ROLE_ARN_PLACEHOLDER|$BEDROCK_ROLE_ARN|g" \
            k8s/base/serviceaccount.yaml | kubectl apply -f -
          kubectl apply -f k8s/base/service.yaml

          echo "==> Canary rollout (${CANARY_REPLICAS} replica)"
          sed -e "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" \
              -e "s|REPLICAS_PLACEHOLDER|$CANARY_REPLICAS|g" \
            k8s/base/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/cicd-python-ecs -n app --timeout=300s

          ./scripts/smoke-test-eks.sh \
            --namespace=app \
            --deployment=cicd-python-ecs \
            --service=cicd-python-ecs \
            --timeout=300

          echo "==> Promote to full rollout (${FULL_REPLICAS} replicas)"
          sed -e "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" \
              -e "s|REPLICAS_PLACEHOLDER|$FULL_REPLICAS|g" \
            k8s/base/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/cicd-python-ecs -n app --timeout=300s

      - name: Post-deploy smoke test
        run: |
          ./scripts/smoke-test-eks.sh \
            --namespace=app \
            --deployment=cicd-python-ecs \
            --service=cicd-python-ecs \
            --endpoint=${{ vars.STAGING_URL }}/health \
            --timeout=300

      - name: Notify success
        if: success()
        run: |
          echo "## Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify failure + auto-rollback
        if: failure()
        run: |
          echo "Deployment failed — rolling back EKS deployment" >&2
          kubectl rollout undo deployment/cicd-python-ecs -n app || true
