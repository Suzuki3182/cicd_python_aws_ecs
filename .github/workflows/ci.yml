name: CI — Lint → Test → Build → Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort mypy

      - name: Run linters
        run: make lint

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r src/app/requirements.txt -r src/app/requirements-dev.txt

      - name: Run tests
        run: make test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage.xml

  skill-conformance:
    name: Skill Conformance Gate
    runs-on: ubuntu-latest
    needs: [test, scan]
    steps:
      - uses: actions/checkout@v5

      - name: Verify Claude skill definitions exist
        run: |
          test -f .claude/skills/deploy-ecs/SKILL.md
          test -f .claude/skills/scan-security/SKILL.md
          test -f .claude/skills/test-integration/SKILL.md
          test -f .claude/skills/rotate-secrets/SKILL.md
          test -f .claude/skills/drift-detection/SKILL.md

      - name: Verify deploy automation parity
        run: |
          grep -q "terraform apply" .github/workflows/cd-staging.yml
          grep -q "aws eks update-kubeconfig" .github/workflows/cd-staging.yml
          grep -q "kubectl rollout status" .github/workflows/cd-staging.yml
          grep -q "Canary rollout" .github/workflows/cd-staging.yml
          grep -q "scripts/smoke-test-eks.sh" .github/workflows/cd-staging.yml
          grep -q "kubectl rollout undo" .github/workflows/cd-staging.yml

          grep -q "terraform apply" .github/workflows/cd-production.yml
          grep -q "aws eks update-kubeconfig" .github/workflows/cd-production.yml
          grep -q "kubectl rollout status" .github/workflows/cd-production.yml
          grep -q "Canary rollout" .github/workflows/cd-production.yml
          grep -q "scripts/smoke-test-eks.sh" .github/workflows/cd-production.yml
          grep -q "kubectl rollout undo" .github/workflows/cd-production.yml

      - name: Verify scan-security automation parity
        run: |
          grep -q "trivy-action" .github/workflows/ci.yml
          grep -q "tfsec-action" .github/workflows/ci.yml
          grep -q "checkov-action" .github/workflows/ci.yml
          grep -q "bandit" .github/workflows/ci.yml

      - name: Verify test-integration automation parity
        run: |
          grep -q "make test" .github/workflows/ci.yml
          grep -q "cov-fail-under=90" Makefile
          grep -q "test-integration:" Makefile

      - name: Verify drift and rotation automation parity
        run: |
          grep -q "terraform plan" .github/workflows/drift-detect.yml
          grep -q -- "-detailed-exitcode" .github/workflows/drift-detect.yml
          grep -q "aws cloudwatch put-metric-data" .github/workflows/drift-detect.yml
          grep -q "aws secretsmanager rotate-secret" .github/workflows/drift-detect.yml
          grep -q "Checkov (>= 95% compliance)" .github/workflows/cd-production.yml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t app:${{ steps.tag.outputs.tag }} src/
          docker save app:${{ steps.tag.outputs.tag }} | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  scan:
    name: Security Scan (SAST + IaC + Container)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load < /tmp/image.tar.gz
          mkdir -p reports

      - name: Trivy SARIF report (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: reports/trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy gate (CRITICAL only — blocks merge)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: tfsec IaC scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          format: json
          additional_args: --minimum-severity HIGH --out reports/tfsec.json

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          framework: terraform
          output_format: json
          output_file_path: reports/checkov.json
          soft_fail: false

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r src/app/ -f json -o reports/bandit.json -ll
        continue-on-error: false

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/trivy.sarif') != ''
        with:
          sarif_file: reports/trivy.sarif

  comment-results:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [test, scan, skill-conformance]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post scan summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Results\n\n✅ Lint passed\n✅ Tests passed\n✅ Security scan passed\n\nImage tag: \`sha-${context.sha.substring(0, 7)}\``
            })
