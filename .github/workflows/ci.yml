name: CI — Lint → Test → Build → Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort mypy

      - name: Run linters
        run: make lint

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r src/app/requirements.txt -r src/app/requirements-dev.txt

      - name: Run tests
        run: make test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage-unit.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t app:${{ steps.tag.outputs.tag }} src/
          docker save app:${{ steps.tag.outputs.tag }} | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  scan:
    name: Security Scan (SAST + IaC + Container)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load < /tmp/image.tar.gz
          mkdir -p reports

      - name: Trivy SARIF report (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: reports/trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy gate (CRITICAL only — blocks merge)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: tfsec IaC scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          format: json
          additional_args: --minimum-severity HIGH --out reports/tfsec.json

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12.999.0
        with:
          directory: infrastructure/terraform
          framework: terraform
          config_file: .checkov.yaml
          output_format: cli,json,sarif
          output_file_path: console,reports/checkov-json,reports/checkov-sarif
          soft_fail: true
          compact: true
          quiet: false

      - name: Generate Checkov HTML report
        if: always()
        run: |
          python - <<'PY'
          import html
          import json
          from pathlib import Path

          candidate_paths = [
              Path("reports/checkov-json"),
              Path("reports/results_json.json"),
              Path("reports/checkov.json"),
          ]
          report_path = next((p for p in candidate_paths if p.exists() and p.is_file()), None)
          if not report_path:
              raise SystemExit("No Checkov JSON report found")
          html_path = Path("reports/checkov.html")
          data = json.loads(report_path.read_text(encoding="utf-8"))
          summary = data.get("summary", {})
          failed_checks = data.get("results", {}).get("failed_checks", [])

          rows = []
          for check in failed_checks:
              rows.append(
                  "<tr>"
                  f"<td>{html.escape(check.get('check_id', ''))}</td>"
                  f"<td>{html.escape(check.get('check_name', ''))}</td>"
                  f"<td>{html.escape(check.get('repo_file_path', ''))}</td>"
                  f"<td>{html.escape(check.get('resource', ''))}</td>"
                  "</tr>"
              )

          html_report = f\"\"\"<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Checkov Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 2rem; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #ddd; padding: 0.5rem; text-align: left; }}
              th {{ background-color: #f5f5f5; }}
            </style>
          </head>
          <body>
            <h1>Checkov Terraform Report</h1>
            <ul>
              <li>Passed: {summary.get('passed', 0)}</li>
              <li>Failed: {summary.get('failed', 0)}</li>
              <li>Skipped: {summary.get('skipped', 0)}</li>
              <li>Parsing errors: {summary.get('parsing_errors', 0)}</li>
            </ul>
            <h2>Failed Checks</h2>
            <table>
              <thead>
                <tr><th>Check ID</th><th>Name</th><th>File</th><th>Resource</th></tr>
              </thead>
              <tbody>
                {''.join(rows) if rows else '<tr><td colspan="4">No failed checks.</td></tr>'}
              </tbody>
            </table>
          </body>
          </html>
          \"\"\"
          html_path.write_text(html_report, encoding="utf-8")
          PY

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r src/app/ -f json -o reports/bandit.json -ll
        continue-on-error: false

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/trivy.sarif') != ''
        with:
          sarif_file: reports/trivy.sarif

      - name: Upload Checkov SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/checkov-sarif') != ''
        with:
          sarif_file: reports/checkov-sarif

      - name: Upload Checkov reports artifact
        if: always() && (hashFiles('reports/checkov-json') != '' || hashFiles('reports/checkov.html') != '')
        uses: actions/upload-artifact@v4
        with:
          name: checkov-reports
          path: |
            reports/checkov-json
            reports/checkov-sarif
            reports/checkov.html

  comment-results:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post scan summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Results\n\n✅ Lint passed\n✅ Tests passed\n✅ Security scan passed\n\nImage tag: \`sha-${context.sha.substring(0, 7)}\``
            })
