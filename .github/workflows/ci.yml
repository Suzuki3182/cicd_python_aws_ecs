name: CI — Lint → Test → Build → Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort mypy

      - name: Run linters
        run: make lint

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r src/app/requirements.txt -r src/app/requirements-dev.txt

      - name: Run tests
        run: make test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage-unit.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t app:${{ steps.tag.outputs.tag }} src/
          docker save app:${{ steps.tag.outputs.tag }} | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  scan:
    name: Security Scan (SAST + IaC + Container)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load < /tmp/image.tar.gz
          mkdir -p reports

      - name: Trivy SARIF report (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: reports/trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy gate (CRITICAL only — blocks merge)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ needs.build.outputs.image_tag }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: tfsec IaC scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          format: json
          additional_args: --minimum-severity HIGH --out reports/tfsec.json

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Checkov (pip)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "checkov>=3,<4"

      - name: Checkov IaC scan
        run: bash scripts/checkov-scan.sh
        continue-on-error: true

      - name: Generate Checkov summary
        if: always()
        run: bash scripts/checkov-summary.sh

      - name: Generate Checkov HTML report
        if: always()
        run: bash scripts/generate-html-report.sh

      - name: Publish Checkov results
        if: always()
        run: bash scripts/publish-results.sh

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r src/app/ -f json -o reports/bandit.json -ll
        continue-on-error: false

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/trivy.sarif') != ''
        with:
          sarif_file: reports/trivy.sarif

      - name: Upload Checkov SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/checkov/checkov.sarif') != ''
        with:
          sarif_file: reports/checkov/checkov.sarif

      - name: Upload Checkov reports artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('reports/checkov/*') != ''
        with:
          name: checkov-reports
          path: reports/checkov

      - name: Display Checkov summary in logs
        if: always()
        run: |
          if [ -f reports/checkov/summary.txt ]; then
            cat reports/checkov/summary.txt
          else
            echo "Checkov summary not generated."
          fi
          if [ -f reports/checkov/summary.md ]; then
            cat reports/checkov/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

  comment-results:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post scan summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Results\n\n✅ Lint passed\n✅ Tests passed\n✅ Security scan passed\n\nImage tag: \`sha-${context.sha.substring(0, 7)}\``
            })
