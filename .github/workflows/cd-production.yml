name: CD — Production (Approval Gate)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to promote to prod (e.g. sha-abc1234)
        required: true
      skip_approval:
        description: Skip manual approval (emergency only)
        required: false
        default: "false"

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: cicd-python-ecs-prod-eks
  TERRAFORM_VERSION: "1.6.0"
  ENVIRONMENT: prod

jobs:
  pre-flight:
    name: Security Gate (tfsec + checkov + Trivy)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Trivy scan on prod image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.ECR_REGISTRY }}/cicd-python-ecs:${{ inputs.image_tag }}
          severity: CRITICAL
          exit-code: 1

      - name: tfsec (HIGH severity gate)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          minimum_severity: HIGH

      - name: Checkov (>= 95% compliance)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          framework: terraform
          check: CKV_AWS_*
          soft_fail: false

  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: pre-flight
    if: inputs.skip_approval != 'true'
    environment: production   # Requires approval in GitHub Environments settings
    steps:
      - name: Approved
        run: echo "Production deployment approved"

  deploy-prod:
    name: Terraform Apply → EKS Deploy → Validate
    runs-on: ubuntu-latest
    needs: [pre-flight, approval]
    if: always() && needs.pre-flight.result == 'success'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: cd infrastructure/terraform && terraform init

      - name: Terraform Apply (prod)
        run: |
          cd infrastructure/terraform
          terraform workspace select ${{ env.ENVIRONMENT }}
          terraform apply \
            -var-file=environments/${{ env.ENVIRONMENT }}.tfvars \
            -var="image_tag=${{ inputs.image_tag }}" \
            -var="enable_eks=true" \
            -var="enable_ecs=false" \
            -var="enable_bedrock_irsa=true" \
            -auto-approve

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy workload to EKS
        run: |
          BEDROCK_ROLE_ARN=$(cd infrastructure/terraform && terraform output -raw bedrock_irsa_role_arn)
          IMAGE_URI="${{ vars.ECR_REGISTRY }}/cicd-python-ecs:${{ inputs.image_tag }}"
          CANARY_REPLICAS=1
          FULL_REPLICAS=3

          kubectl apply -f k8s/base/namespace.yaml
          sed "s|BEDROCK_ROLE_ARN_PLACEHOLDER|$BEDROCK_ROLE_ARN|g" \
            k8s/base/serviceaccount.yaml | kubectl apply -f -
          kubectl apply -f k8s/base/service.yaml

          echo "==> Canary rollout (${CANARY_REPLICAS} replica)"
          sed -e "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" \
              -e "s|REPLICAS_PLACEHOLDER|$CANARY_REPLICAS|g" \
            k8s/base/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/cicd-python-ecs -n app --timeout=600s

          ./scripts/smoke-test-eks.sh \
            --namespace=app \
            --deployment=cicd-python-ecs \
            --service=cicd-python-ecs \
            --timeout=600

          echo "==> Promote to full rollout (${FULL_REPLICAS} replicas)"
          sed -e "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" \
              -e "s|REPLICAS_PLACEHOLDER|$FULL_REPLICAS|g" \
            k8s/base/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/cicd-python-ecs -n app --timeout=600s

      - name: Production smoke test
        run: |
          ./scripts/smoke-test-eks.sh \
            --namespace=app \
            --deployment=cicd-python-ecs \
            --service=cicd-python-ecs \
            --endpoint=${{ vars.PROD_URL }}/health \
            --timeout=600

      - name: Deployment summary
        if: success()
        run: |
          echo "## Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ vars.PROD_URL }}" >> $GITHUB_STEP_SUMMARY

      - name: Auto-rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/cicd-python-ecs -n app || true
