name: CD — Production (Approval Gate)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to promote to prod (e.g. sha-abc1234)
        required: true
      skip_approval:
        description: Skip manual approval (emergency only)
        required: false
        default: "false"

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: cicd-python-ecs-prod
  TERRAFORM_VERSION: "1.6.0"
  ENVIRONMENT: prod

jobs:
  pre-flight:
    name: Security Gate (tfsec + checkov + Trivy)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Trivy scan on prod image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.ECR_REGISTRY }}/cicd-python-ecs:${{ inputs.image_tag }}
          severity: CRITICAL
          exit-code: 1

      - name: tfsec (HIGH severity gate)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/terraform
          minimum_severity: HIGH

      - name: Checkov (>= 95% compliance)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          framework: terraform
          check: CKV_AWS_*
          soft_fail: false

  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: pre-flight
    if: inputs.skip_approval != 'true'
    environment: production   # Requires approval in GitHub Environments settings
    steps:
      - name: Approved
        run: echo "Production deployment approved"

  deploy-prod:
    name: Terraform Apply → ECS Deploy → Validate
    runs-on: ubuntu-latest
    needs: [pre-flight, approval]
    if: always() && needs.pre-flight.result == 'success'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: cd infrastructure/terraform && terraform init

      - name: Terraform Apply (prod)
        run: |
          cd infrastructure/terraform
          terraform workspace select ${{ env.ENVIRONMENT }}
          terraform apply \
            -var-file=environments/${{ env.ENVIRONMENT }}.tfvars \
            -var="image_tag=${{ inputs.image_tag }}" \
            -auto-approve

      - name: Wait for ECS service stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services cicd-python-ecs-${{ env.ENVIRONMENT }}

      - name: Production smoke test
        run: |
          ./scripts/smoke-test.sh \
            --env=${{ env.ENVIRONMENT }} \
            --endpoint=${{ vars.PROD_URL }}/health \
            --timeout=600

      - name: Deployment summary
        if: success()
        run: |
          echo "## Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ vars.PROD_URL }}" >> $GITHUB_STEP_SUMMARY

      - name: Auto-rollback on failure
        if: failure()
        run: |
          ./scripts/auto-rollback.sh \
            --env=${{ env.ENVIRONMENT }} \
            --cluster=${{ env.ECS_CLUSTER }}
