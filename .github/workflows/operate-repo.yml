name: Operate Repo (One-Click)

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment scope"
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging
        required: true
      deploy_staging:
        description: "Run staging deployment"
        type: boolean
        default: false
        required: true
      promote_production:
        description: "Run production promotion after staging checks"
        type: boolean
        default: false
        required: true
      image_tag:
        description: "Image tag (sha-xxxx). If empty, current short SHA is used"
        required: false
      run_drift_detection:
        description: "Run drift plan checks"
        type: boolean
        default: true
        required: true

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  TERRAFORM_VERSION: "1.6.0"

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate promote path
        run: |
          if [ "${{ github.event.inputs.promote_production }}" = "true" ] && [ "${{ github.event.inputs.deploy_staging }}" != "true" ]; then
            echo "promote_production=true requires deploy_staging=true for safe promotion flow" >&2
            exit 1
          fi

  quality-and-security:
    name: Lint + Test + Build + Scan
    runs-on: ubuntu-latest
    needs: validate-inputs
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r src/app/requirements.txt -r src/app/requirements-dev.txt
          pip install ruff black isort

      - name: Lint and tests
        run: |
          make lint
          make test

      - name: Build image
        run: docker build -t app:${{ steps.tag.outputs.tag }} src/

      - name: Security scan gate
        run: make scan IMAGE_TAG=${{ steps.tag.outputs.tag }}

  drift-check:
    name: Drift Check
    if: github.event.inputs.run_drift_detection == 'true'
    runs-on: ubuntu-latest
    needs: quality-and-security
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(format('["{0}"]', github.event.inputs.target_environment)) }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-ReadOnly
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform drift plan
        run: |
          cd infrastructure/terraform
          terraform init
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}
          set +e
          terraform plan -var-file=environments/${{ matrix.environment }}.tfvars -detailed-exitcode -no-color > /tmp/drift-${{ matrix.environment }}.txt
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" = "1" ]; then
            echo "Terraform plan failed for ${{ matrix.environment }}" >&2
            cat /tmp/drift-${{ matrix.environment }}.txt
            exit 1
          fi
          if [ "$EXIT_CODE" = "2" ]; then
            echo "Drift detected for ${{ matrix.environment }}"
            aws cloudwatch put-metric-data --namespace "Claude/Agent" --metric-name "DriftDetected" --value 1 --dimensions Environment=${{ matrix.environment }}
          else
            echo "No drift for ${{ matrix.environment }}"
          fi

      - name: Upload drift artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ matrix.environment }}
          path: /tmp/drift-${{ matrix.environment }}.txt

  deploy-staging:
    name: Trigger Staging CD
    if: github.event.inputs.deploy_staging == 'true' && github.event.inputs.target_environment == 'staging'
    runs-on: ubuntu-latest
    needs: [quality-and-security, drift-check]
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch staging deployment workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-staging.yml',
              ref: context.ref.replace('refs/heads/', ''),
              inputs: {
                image_tag: '${{ needs.quality-and-security.outputs.image_tag }}'
              }
            });
            core.info('Dispatched cd-staging.yml');

  promote-prod:
    name: Trigger Production CD
    if: github.event.inputs.promote_production == 'true' && github.event.inputs.target_environment == 'prod'
    runs-on: ubuntu-latest
    needs: [quality-and-security, deploy-staging]
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch production deployment workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-production.yml',
              ref: context.ref.replace('refs/heads/', ''),
              inputs: {
                image_tag: '${{ needs.quality-and-security.outputs.image_tag }}',
                skip_approval: 'false'
              }
            });
            core.info('Dispatched cd-production.yml');

  summary:
    name: Operations Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-and-security, drift-check, deploy-staging, promote-prod]
    steps:
      - name: Write summary
        run: |
          echo "## Operate Repo summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag: ${{ needs.quality-and-security.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Quality/security: ${{ needs.quality-and-security.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Drift check: ${{ needs.drift-check.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Staging deploy trigger: ${{ needs.deploy-staging.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production deploy trigger: ${{ needs.promote-prod.result }}" >> "$GITHUB_STEP_SUMMARY"
